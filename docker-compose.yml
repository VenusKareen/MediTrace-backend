
services:
  postgres:
    image: postgres:16
    container_name: meditrace_postgres
    restart: always
    environment:
      POSTGRES_USER: meditrace_user
      POSTGRES_PASSWORD: meditrace_pass
      POSTGRES_DB: meditrace_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: meditrace_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meditrace.ke
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
